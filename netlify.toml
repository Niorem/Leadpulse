[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "18"

# Redirect API calls to Netlify Functions
[[redirects]]
  from = "/api/health"
  to = "/.netlify/functions/health"
  status = 200

[[redirects]]
  from = "/api/collect"
  to = "/.netlify/functions/collect"
  status = 200

# SPA fallback - tutte le route vanno a index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
